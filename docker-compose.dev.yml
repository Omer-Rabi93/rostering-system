## Local dev/test Postgres ONLY.
##
## This is NOT the production stack (that's Phase 7's root docker-compose.yml
## with nginx + api replicas + worker + postgres on an internal-only network).
## This file exists purely so `apps/api` has a real Postgres to run
## `prisma migrate`, the seed script, and integration tests against on a
## developer's machine or in CI.
##
## Usage:
##   docker compose -f docker-compose.dev.yml up -d
##
## Reads POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB / POSTGRES_PORT from
## a root `.env` file (gitignored, see `.env.example` for the documented
## placeholder values). Falls back to throwaway dev-only defaults if `.env`
## is absent so a fresh checkout can still `docker compose up` immediately.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-dbname}
    ports:
      # Bind to loopback only — never expose the dev database on 0.0.0.0.
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - rostering-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-dbname}"]
      interval: 2s
      timeout: 3s
      retries: 30

  # pgAdmin — local dev convenience only, not part of the production stack (docker-compose.yml).
  # `PGADMIN_CONFIG_SERVER_MODE: "False"` runs it in desktop mode (auto-logged-in with the
  # PGADMIN_DEFAULT_EMAIL/PASSWORD below, no separate hosted-login account) — fine for a
  # loopback-only local container, not something to carry into any shared/hosted environment.
  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      # Note: pgAdmin's own startup validation (python-email-validator) rejects both a bare
      # `dev@localhost` (no period in the domain part) and any `*.local`/`*.test`/`*.invalid`
      # domain (flagged as "special-use or reserved"), so a naive local-only placeholder email
      # crash-loops the container. `admin@example.com` is RFC 2606's reserved example domain —
      # obviously a placeholder, and one of the few forms this validator actually accepts.
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-dev}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    volumes:
      - rostering-dev-pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  rostering-dev-postgres-data:
  rostering-dev-pgadmin-data:

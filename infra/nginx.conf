# Rostering System edge proxy: serves the built SPA (history-mode client-side routing) and
# load-balances /api (including /api/schedule) to the `api` compose service's replicas.
#
# Loaded as /etc/nginx/conf.d/default.conf inside the stock nginx:alpine image, which already
# `include`s conf.d/*.conf from within its top-level `http { }` block — so directives that must
# live in the http context (upstream, limit_req_zone, gzip, map) are declared directly here
# rather than needing a separate nginx.conf.
#
# This is the ONLY published port in the whole stack (docker-compose.yml maps this to host :80);
# api/worker/postgres are reachable only on the internal compose network.

# --- upstream: the `api` compose service, scaled (e.g. `docker compose up --scale api=2`) -----
# A plain `server` entry with a hostname is resolved via Docker's embedded DNS at nginx start.
# When that name has multiple A records (as it does for a scaled compose service — every
# replica registers under the same service name), nginx uses ALL of them as separate upstream
# peers automatically; least_conn then load-balances across whichever replicas are up.
upstream api {
    least_conn;
    server api:3000;
}

# Edge-level rate limit for the unauthenticated /api/schedule route, mirroring (defense in depth,
# not a replacement for) apps/api's own express-rate-limit on the same route (60s window, 30
# requests/IP — see apps/api/src/app.ts's `publicScheduleLimiter`). A small burst is allowed so
# one legitimate page load issuing a couple of requests isn't rejected outright.
limit_req_zone $binary_remote_addr zone=schedule_limit:10m rate=30r/m;

# gzip: static SPA assets (JS/CSS) and the JSON API responses proxied through this same server.
gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_comp_level 5;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    image/svg+xml;

# Sized for the 1,000-10,000-worker-per-company scale target: the two app-level caps this must
# clear are apps/api's CSV upload (`MAX_CSV_FILE_SIZE_BYTES`, 8 MB — see
# apps/api/src/routes/csvUpload.ts, shared by the combined workforce-CSV import route) and the
# availability grid's bulk PUT JSON body (`AVAILABILITY_JSON_BODY_LIMIT`, 12 MB — see
# apps/api/src/routes/availability.ts) — the larger of the two, 12 MB, plus headroom for multipart
# boundary/header overhead on the CSV upload path, so nginx never rejects a request either app-level
# limit would have accepted. Must be raised again if either of those two app-level limits is raised
# further.
client_max_body_size 16m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers on every response (including proxied /api responses — /api/schedule
    # included — and error pages) — `always` so they're also sent on non-2xx/3xx statuses. The SPA
    # is fully
    # self-hosted (no third-party scripts/styles/fonts/images), so `default-src 'self'` needs no
    # extra loosening; `frame-ancestors 'none'` + `X-Frame-Options: DENY` both block framing
    # (kept both for older-browser coverage), `object-src 'none'` blocks plugin embeds.
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Generous proxy timeouts: job-status polling (GET /api/jobs/:id) is a series of short
    # discrete requests, not a single held-open connection, but roster-generation work happening
    # server-side can make an individual poll's round trip slower than nginx's tight defaults
    # under load — these margins are safety headroom, not a long-polling contract.
    proxy_connect_timeout 10s;
    proxy_send_timeout 90s;
    proxy_read_timeout 90s;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Public, unauthenticated worker-schedule route (apps/api/src/app.ts mounts it at
    # `/api/schedule`) — edge rate limit on top of the app-level one. Declared as its own
    # `location` (rather than folding the rate limit into the general `/api` block below) because
    # nginx `location` blocks aren't inherited: `limit_req` scoped to just `/api` would either
    # throttle the entire API surface (wrong — no other route has one) or, applied inside `location
    # /api` and expected to somehow "not apply" to sibling paths, wouldn't be possible at all
    # without a second, more specific block like this one. nginx always matches the LONGEST
    # prefix location for a given request, so a request to `/api/schedule/<token>` matches this
    # block and never falls through to the general `/api` block below regardless of declaration
    # order.
    location /api/schedule {
        limit_req zone=schedule_limit burst=10 nodelay;
        proxy_pass http://api;
    }

    # No trailing path component after the upstream name: nginx forwards the ORIGINAL request
    # URI (including the /api prefix) unchanged, which is what apps/api's Express router expects
    # (it mounts routes at /api/... itself — see apps/api/src/app.ts). Every other /api/* route
    # (i.e. everything except /api/schedule, matched above) has no edge rate limit.
    location /api {
        proxy_pass http://api;
    }

    # SPA history-mode fallback: serve the requested file/asset if it exists (hashed JS/CSS
    # under /assets/...), otherwise fall back to index.html so client-side routing
    # (React Router, added in Phase 8/9) owns the URL instead of nginx 404ing it.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
